<!DOCTYPE html>
<html>
<head>
  <title>SaathiSync - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

<div class="auth-wrapper">
  <div class="auth-brand-panel">
    <div class="brand-chip"><span class="logo-mark">SS</span><strong>SaathiSync</strong></div>
    <h1>Study smarter with your team.</h1>
    <p>Plan deadlines, find partners, and stay on track with one focused workspace.</p>
  </div>

  <div class="auth-card card">
      <h2>Welcome to SaathiSync</h2>

      <div id="loginForm">
        <h3>Login</h3>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter your password" required>
        </div>
        <button class="btn auth-submit" onclick="login()">Login</button>
        <p class="auth-switch">
          Don't have an account?
          <a href="#" onclick="showSignup(); return false;">Sign up</a>
        </p>
      </div>

      <div id="signupForm" style="display: none;">
        <h3>Create Account</h3>
        <div class="form-group">
          <label for="signupName">Full Name</label>
          <input id="signupName" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label for="signupEmail">Email</label>
          <input id="signupEmail" type="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input id="signupPassword" type="password" placeholder="Create a password (min 8 chars)" required>
        </div>
        <div class="form-group">
          <label for="signupConfirm">Confirm Password</label>
          <input id="signupConfirm" type="password" placeholder="Confirm your password" required>
        </div>
        <button class="btn auth-submit" onclick="signup()">Sign Up</button>
        <p class="auth-switch">
          Already have an account?
          <a href="#" onclick="showLogin(); return false;">Login</a>
        </p>
      </div>
  </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
