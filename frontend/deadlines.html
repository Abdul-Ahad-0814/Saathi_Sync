<!DOCTYPE html>
<html>
<head>
  <title>Deadlines</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  
  <div class="sidebar">
<a href="dashboard.html"><div class="sidebar-logo"><span class="logo-mark">SS</span><h2>SaathiSync</h2></div></a>
        
        <p class="sidebar-section-label">Menu</p>
        <a href="dashboard.html"><span class="nav-icon">◩</span><span>Dashboard</span></a>
        <a href="partners.html"><span class="nav-icon">◉</span><span>Study Partners</span></a>
        <a href="groups.html"><span class="nav-icon">◎</span><span>Groups</span></a>
        <a class="active" href="deadlines.html"><span class="nav-icon">◷</span><span>Deadlines</span></a>
        <a href="resources.html"><span class="nav-icon">▣</span><span>Resources</span></a>
        <a href="library.html"><span class="nav-icon">▤</span><span>Library</span></a>
        <a href="bookmarks.html"><span class="nav-icon">▮</span><span>Bookmarks</span></a>

        <p class="sidebar-section-label">General</p>
        <a href="sessions.html"><span class="nav-icon">◔</span><span>Study Sessions</span></a>
        <a href="profile.html"><span class="nav-icon">◌</span><span>Profile</span></a>
        <a href="settings.html"><span class="nav-icon">◫</span><span>Settings</span></a>
        <a href="logout.html"><span class="nav-icon">↦</span><span>Logout</span></a>
      
        <div class="sidebar-promo"><img src="../image_src/logo_3.png"alt="Saathi Logo" class="sidebar-logo"/></div>
  </div>

  <div class="main">
    <div class="topbar page-topbar">
      <h1>Study Deadlines</h1>
      <button class="btn" onclick="addDeadline()">Add Deadline</button>
    </div>

    <div class="card form-card">
      <h2>Add New Deadline</h2>
      <div class="form-group">
        <label for="title">Deadline Title</label>
        <input id="title" placeholder="Enter deadline title" required>
      </div>
      <div class="form-group">
        <label for="date">Due Date</label>
        <input id="date" type="date" required>
      </div>
      <div class="form-group">
        <label for="priority">Priority</label>
        <select id="priority">
          <option value="Low">Low</option>
          <option value="Medium" selected>Medium</option>
          <option value="High">High</option>
        </select>
      </div>
      <div class="form-group">
        <label for="status">Status</label>
        <select id="status">
          <option value="Pending" selected>Pending</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
        </select>
      </div>
      <button class="btn" onclick="addDeadline()">Add Deadline</button>
    </div>

    <div class="card">
      <div class="filter-bar">
        <select id="filterPriority">
          <option>All Priorities</option>
          <option>High</option>
          <option>Medium</option>
          <option>Low</option>
        </select>
        <select id="filterStatus">
          <option>All Statuses</option>
          <option>Completed</option>
          <option>In Progress</option>
          <option>Pending</option>
        </select>
        <input type="date" placeholder="From date">
        <input type="date" placeholder="To date">
      </div>
      <h2>Your Deadlines</h2>
      <div class="table-shell">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Due Date</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="deadlinesList">
            <!-- Deadlines will be loaded here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script src="js/app.js"></script>
<script>
  window.onload = function() {
    loadDeadlines();
    // Add filter listeners
    const prioritySelect = document.getElementById('filterPriority');
    const statusSelect = document.getElementById('filterStatus');
    if (prioritySelect) {
      prioritySelect.addEventListener('change', () => {
        const priority = prioritySelect.value;
        const status = statusSelect ? statusSelect.value : null;
        loadDeadlines(priority, status);
      });
    }
    if (statusSelect) {
      statusSelect.addEventListener('change', () => {
        const priority = prioritySelect ? prioritySelect.value : null;
        const status = statusSelect.value;
        loadDeadlines(priority, status);
      });
    }
  };
</script>

</body>
</html>
