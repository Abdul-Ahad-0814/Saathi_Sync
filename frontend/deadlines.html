<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  
  <div class="sidebar">
    <h2>SaathiSync</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="deadlines.html">Deadlines</a>
  </div>

  <div class="main">
    <h1>Study Deadlines</h1>

    <div class="card">
      <h2>Add New Deadline</h2>
      <div class="form-group">
        <label for="title">Deadline Title</label>
        <input id="title" placeholder="Enter deadline title" required>
      </div>
      <div class="form-group">
        <label for="date">Due Date</label>
        <input id="date" type="date" required>
      </div>
      <button class="btn" onclick="addDeadline()">Add Deadline</button>
    </div>

    <div class="card">
      <h2>Your Deadlines</h2>
      <div id="deadlinesList" class="grid">
        <!-- Deadlines will be loaded here -->
      </div>
    </div>
  </div>

</div>

<script src="js/app.js"></script>
<script>
  window.onload = function() {
    loadDeadlines();
  };
</script>

</body>
</html>
