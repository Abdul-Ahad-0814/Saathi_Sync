<!DOCTYPE html>
<html>
<head>
  <title>Resources</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <div class="sidebar-logo"><span class="logo-mark">SS</span><h2>SaathiSync</h2></div>
    <p class="sidebar-section-label">Menu</p>
    <a href="dashboard.html"><span class="nav-icon">◩</span><span>Dashboard</span></a>
    <a href="groups.html"><span class="nav-icon">◎</span><span>Groups</span></a>
    <a href="deadlines.html"><span class="nav-icon">◷</span><span>Deadlines</span></a>
    <a class="active" href="resources.html"><span class="nav-icon">▣</span><span>Resources</span></a>
    <a href="sessions.html"><span class="nav-icon">◔</span><span>Study Sessions</span></a>
    <a href="profile.html"><span class="nav-icon">◌</span><span>Profile</span></a>
  </div>

  <div class="main">
    <div class="topbar page-topbar">
      <h1>Study Resources</h1>
      <button class="btn" onclick="uploadResource()">⬆ Upload Resource</button>
    </div>

    <div class="card form-card">
      <h2>Upload New Resource</h2>
      <div class="form-group">
        <label for="resourceTitle">Resource Title</label>
        <input id="resourceTitle" placeholder="Enter resource title" required>
      </div>
      <div class="form-group">
        <label for="resourceDesc">Description</label>
        <textarea id="resourceDesc" placeholder="Describe the resource" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label for="resourceFile">File URL (optional)</label>
        <input id="resourceFile" placeholder="https://example.com/file.pdf">
      </div>
      <button class="btn" onclick="uploadResource()">Upload Resource</button>
    </div>

    <div class="card">
      <h2>Available Resources</h2>
      <div id="resourcesList" class="resources-grid">
        <!-- Resources will be loaded here -->
      </div>
    </div>
  </div>

</div>

<script src="js/app.js"></script>
<script>
  window.onload = function() {
    loadResources();
  };
</script>

</body>
</html>
