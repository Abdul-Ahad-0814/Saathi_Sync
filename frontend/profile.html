<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <a href="dashboard.html"><div class="sidebar-logo"><span class="logo-mark">SS</span><h2>SaathiSync</h2></div></a>
        
    <p class="sidebar-section-label">Menu</p>
    <a href="dashboard.html"><span class="nav-icon">◩</span><span>Dashboard</span></a>
    <a href="partners.html"><span class="nav-icon">◉</span><span>Study Partners</span></a>
    <a href="groups.html"><span class="nav-icon">◎</span><span>Groups</span></a>
    <a href="deadlines.html"><span class="nav-icon">◷</span><span>Deadlines</span></a>
    <a href="resources.html"><span class="nav-icon">▣</span><span>Resources</span></a>
    <a href="library.html"><span class="nav-icon">▤</span><span>Library</span></a>
    <a href="bookmarks.html"><span class="nav-icon">▮</span><span>Bookmarks</span></a>

    <p class="sidebar-section-label">General</p>
    <a  href="sessions.html"><span class="nav-icon">◔</span><span>Study Sessions</span></a>
    <a class="active" href="profile.html"><span class="nav-icon">◌</span><span>Profile</span></a>
    <a href="settings.html"><span class="nav-icon">◫</span><span>Settings</span></a>
    <a href="logout.html"><span class="nav-icon">↦</span><span>Logout</span></a>
  
    <div class="sidebar-promo"><img src="../image_src/logo_3.png"alt="Saathi Logo" class="sidebar-logo"/></div>
  </div>

  <div class="main">
    <div class="topbar page-topbar">
      <h1>Profile</h1>
    </div>

    <div class="card profile-top-card">
      <div class="profile-avatar-lg">SS</div>
      <div>
        <h2 id="profileDisplayName">Saathi User</h2>
        <p id="profileDisplayEmail">student@saathi.app</p>
        <span id="profileDisplayRole" class="badge-status in-progress">Student</span>
      </div>
    </div>

    <div class="profile-stats-row">
      <div class="card mini-stat-card"><span class="stat-label">Sessions</span><strong id="profileSessionCount">0</strong></div>
      <div class="card mini-stat-card"><span class="stat-label">Deadlines</span><strong id="profileDeadlineCount">0</strong></div>
      <div class="card mini-stat-card"><span class="stat-label">Resources Uploaded</span><strong id="profileResourceCount">0</strong></div>
    </div>

    <div class="card form-card profile-form-card">
      <h3>Edit Profile</h3>
      <div class="profile-form-grid">
        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" placeholder="Name">
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input id="subject" placeholder="Subject">
        </div>
        <div class="form-group">
          <label for="availability">Availability</label>
          <input id="availability" placeholder="Availability">
        </div>
      </div>
      <button class="btn" onclick="updateProfile()">Save</button>
    </div>

    <div class="card form-card profile-form-card">
      <h3>Profile Activity</h3>
      <div class="profile-form-grid">
        <div class="form-group">
          <label>Bookmarks</label>
          <input id="profileBookmarkCount" readonly value="0">
        </div>
        <div class="form-group">
          <label>Groups</label>
          <input id="profileGroupCount" readonly value="0">
        </div>
      </div>
    </div>

  </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
