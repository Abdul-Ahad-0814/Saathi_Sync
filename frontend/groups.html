<!DOCTYPE html>
<html>
<head>
  <title>Groups</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2>SaathiSync</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="groups.html">Groups</a>
  </div>

  <div class="main">
    <h1>Study Groups</h1>

    <div class="card">
      <h2>Create New Group</h2>
      <div class="form-group">
        <label for="groupName">Group Name</label>
        <input id="groupName" placeholder="Enter group name" required>
      </div>
      <div class="form-group">
        <label for="groupDesc">Description</label>
        <textarea id="groupDesc" placeholder="Describe your study group" rows="3"></textarea>
      </div>
      <button class="btn" onclick="createGroup()">Create Group</button>
    </div>

    <div class="card">
      <h2>Available Groups</h2>
      <div id="groupsList" class="grid">
        <!-- Groups will be loaded here -->
      </div>
    </div>
  </div>

</div>

<script src="js/app.js"></script>
<script>
  window.onload = function() {
    loadGroups();
  };
</script>

</body>
</html>
