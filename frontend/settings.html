<!DOCTYPE html>
<html>
<head>
  <title>Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <div class="sidebar-logo"><span class="logo-mark">SS</span><h2>SaathiSync</h2></div>
    <p class="sidebar-section-label">Menu</p>
    <a href="dashboard.html"><span class="nav-icon">◩</span><span>Dashboard</span></a>
    <a href="partners.html"><span class="nav-icon">◉</span><span>Study Partners</span></a>
    <a href="groups.html"><span class="nav-icon">◎</span><span>Groups</span></a>
    <a href="deadlines.html"><span class="nav-icon">◷</span><span>Deadlines</span></a>
    <a href="resources.html"><span class="nav-icon">▣</span><span>Resources</span></a>
    <a href="library.html"><span class="nav-icon">▤</span><span>Library</span></a>
    <a href="bookmarks.html"><span class="nav-icon">▮</span><span>Bookmarks</span></a>

    <p class="sidebar-section-label">General</p>
    <a href="sessions.html"><span class="nav-icon">◔</span><span>Study Sessions</span></a>
    <a href="profile.html"><span class="nav-icon">◌</span><span>Profile</span></a>
    <a class="active" href="settings.html"><span class="nav-icon">◫</span><span>Settings</span></a>
    <a href="logout.html"><span class="nav-icon">↦</span><span>Logout</span></a>
  </div>

  <div class="main">
    <div class="topbar page-topbar">
      <h1>Settings</h1>
    </div>

    <div class="card settings-card">
      <h2>Account Settings</h2>
      <div class="settings-grid">
        <div class="form-group">
          <label for="settingsName">Display Name</label>
          <input id="settingsName" placeholder="Your display name">
        </div>
        <div class="form-group">
          <label for="settingsEmail">Email</label>
          <input id="settingsEmail" type="email" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label for="settingsTimezone">Timezone</label>
          <select id="settingsTimezone">
            <option>Asia/Karachi</option>
            <option>Asia/Kolkata</option>
            <option>UTC</option>
          </select>
        </div>
        <div class="form-group">
          <label for="settingsMode">Default Study Mode</label>
          <select id="settingsMode">
            <option>Focus Sessions</option>
            <option>Group Sessions</option>
            <option>Mixed</option>
          </select>
        </div>
      </div>

      <div class="settings-actions">
        <button class="btn">Save Changes</button>
        <button class="btn btn-secondary">Reset</button>
      </div>
    </div>

    <div class="card settings-card">
      <h3>Notification Preferences</h3>
      <div class="settings-check-row"><input id="notifyDeadlines" type="checkbox" checked><label for="notifyDeadlines">Deadline reminders</label></div>
      <div class="settings-check-row"><input id="notifySessions" type="checkbox" checked><label for="notifySessions">Session updates</label></div>
      <div class="settings-check-row"><input id="notifyResources" type="checkbox"><label for="notifyResources">Resource activity</label></div>
    </div>
  </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
