<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2>SaathiSync</h2>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="partners.html">👥 Study Partners</a>
    <a href="groups.html">👥 Groups</a>
    <a href="deadlines.html">⏰ Deadlines</a>
    <a href="resources.html">📚 Resources</a>
    <a href="library.html">📖 Library</a>
    <a href="bookmarks.html">🔖 Bookmarks</a>
    <a href="sessions.html">📅 Study Sessions</a>
    <a href="profile.html">👤 Profile</a>
    <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.2); margin: 20px 0;">
    <a href="#" onclick="logout()" style="color: #ff6b6b;">🚪 Logout</a>
  </div>

  <div class="main">
    <h1>Dashboard</h1>

    <div class="card">
      <h3>Welcome Back 👋</h3>
      <p id="welcomeMessage">Your study overview</p>
    </div>

    <div class="card">
      <h3>Upcoming Deadlines</h3>
      <div id="deadlinesList" class="grid">
        <!-- Deadlines will be loaded here -->
      </div>
    </div>

    <div class="card">
      <h3>Quick Actions</h3>
      <div style="display: flex; gap: 15px; flex-wrap: wrap;">
        <button onclick="window.location.href='deadlines.html'" class="btn">Add Deadline</button>
        <button onclick="window.location.href='groups.html'" class="btn">Create Group</button>
        <button onclick="window.location.href='resources.html'" class="btn">Upload Resource</button>
      </div>
    </div>
  </div>

</div>

<script src="js/app.js"></script>
<script>
  // Load user info
  const userName = localStorage.getItem('user_name');
  if (userName) {
    document.getElementById('welcomeMessage').textContent = `Welcome back, ${userName}! Here's your study overview.`;
  }

  // Load deadlines on page load
  window.onload = function() {
    loadDeadlines();
  };
</script>

</body>
</html>
